name: Android CI Build

# Trigger this workflow on every push and pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (required for modern Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Grant execute permission to the Gradle wrapper script
      - name: Grant execute permission for gradlew
        run: chmod +x mithOrfact/gradlew

      # Step 4: Run unit tests
      - name: Run unit tests
        run: cd mithOrfact && ./gradlew test

      # Step 5: Build the debug APK
      - name: Build debug APK
        run: cd mithOrfact && ./gradlew assembleDebug

      # Step 6: Upload the built APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mithOrfact/app/build/outputs/apk/debug/app-debug.apk
